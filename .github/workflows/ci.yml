name: ci

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . --no-build-isolation
          pip install pytest
      - name: Run tests
        run: pytest -q
      - name: Create regression snapshot
        run: MPLCONFIGDIR=/tmp/mpl python scripts/create_regression_snapshot.py --name ci_candidate
      - name: Enforce regression thresholds
        run: |
          MPLCONFIGDIR=/tmp/mpl python scripts/check_regressions.py \
            --left outputs/regression/snapshots/baseline_reference.json \
            --right outputs/regression/snapshots/ci_candidate.json \
            --thresholds configs/regression_thresholds.json \
            --output-dir outputs/regression/ci_gate
      - name: Build regression history
        run: |
          MPLCONFIGDIR=/tmp/mpl python scripts/build_regression_history.py \
            --snapshot-dir outputs/regression/snapshots \
            --output-dir outputs/regression/ci_history \
            --gate-report outputs/regression/ci_gate/regression_gate.json
      - name: Build provenance index
        run: |
          MPLCONFIGDIR=/tmp/mpl python scripts/backfill_provenance_manifests.py
          MPLCONFIGDIR=/tmp/mpl python scripts/build_provenance_index.py
      - name: Build release notes
        run: |
          MPLCONFIGDIR=/tmp/mpl python scripts/generate_release_notes.py \
            --base 9947b32 \
            --head HEAD \
            --output-dir outputs/releases/ci
      - name: Build anomaly analysis
        run: MPLCONFIGDIR=/tmp/mpl python scripts/generate_anomaly_report.py
      - name: Build mitigation recommendations
        run: python scripts/generate_recommendations.py
      - name: Build triage queue
        run: python scripts/generate_triage_queue.py
      - name: Build incident bundles
        run: python scripts/generate_incident_bundles.py
      - name: Build knowledge base
        run: python scripts/generate_knowledge_base.py
      - name: Build escalation matrix
        run: python scripts/generate_escalation_matrix.py
      - name: Build support ops report
        run: python scripts/generate_support_ops_report.py
      - name: Build support gap report
        run: python scripts/generate_support_gap_report.py
      - name: Build workstream plan
        run: python scripts/generate_workstream_plan.py
      - name: Build delivery forecast
        run: python scripts/generate_sla_report.py
      - name: Build capacity plan
        run: python scripts/generate_capacity_plan.py
      - name: Build ops review
        run: python scripts/generate_ops_review.py
      - name: Build support readiness gate
        run: python scripts/generate_support_readiness.py
      - name: Build scenario plan
        run: python scripts/generate_scenario_plan.py
      - name: Build artifact freshness audit
        run: python scripts/generate_artifact_freshness.py
      - name: Build regeneration plan
        run: python scripts/generate_regeneration_plan.py
      - name: Build dependency map
        run: python scripts/generate_dependency_map.py
      - name: Build impact analysis
        run: python scripts/generate_impact_analysis.py
      - name: Build refresh bundle
        run: python scripts/generate_refresh_bundle.py
      - name: Build refresh checklist
        run: python scripts/generate_refresh_checklist.py
      - name: Build maintenance risk report
        run: python scripts/generate_maintenance_risk.py
      - name: Build artifact readiness gate
        run: python scripts/generate_artifact_readiness.py
      - name: Build artifact scenarios
        run: python scripts/generate_artifact_scenarios.py
      - name: Build artifact recovery roadmap
        run: python scripts/generate_artifact_recovery.py
      - name: Build artifact delivery forecast
        run: python scripts/generate_artifact_delivery.py
      - name: Build artifact capacity plan
        run: python scripts/generate_artifact_capacity.py
      - name: Build artifact executive summary
        run: python scripts/generate_artifact_exec_summary.py
      - name: Build artifact history
        run: python scripts/generate_artifact_history.py
      - name: Build artifact actions
        run: python scripts/generate_artifact_actions.py
      - name: Build artifact alerts
        run: python scripts/generate_artifact_alerts.py
      - name: Build artifact digest
        run: python scripts/generate_artifact_digest.py
      - name: Build artifact handoff
        run: python scripts/generate_artifact_handoff.py
      - name: Build artifact review note
        run: python scripts/generate_artifact_review_note.py
      - name: Build artifact closeout
        run: python scripts/generate_artifact_closeout.py
      - name: Build artifact scorecard
        run: python scripts/generate_artifact_scorecard.py
      - name: Build artifact packet
        run: python scripts/generate_artifact_packet.py
      - name: Build dashboard snapshot
        run: python scripts/generate_dashboard_snapshot.py
      - name: Build dashboard snapshot history
        run: python scripts/generate_dashboard_snapshot_history.py
      - name: Build dashboard snapshot drift
        run: python scripts/generate_dashboard_snapshot_drift.py
      - name: Build dashboard snapshot alerts
        run: python scripts/generate_dashboard_snapshot_alerts.py
      - name: Build dashboard snapshot monitor
        run: python scripts/generate_dashboard_snapshot_monitor.py
      - name: Build dashboard snapshot review
        run: python scripts/generate_dashboard_snapshot_review.py
      - name: Build dashboard snapshot handoff
        run: python scripts/generate_dashboard_snapshot_handoff.py
      - name: Build dashboard snapshot closeout
        run: python scripts/generate_dashboard_snapshot_closeout.py
      - name: Build dashboard snapshot scorecard
        run: python scripts/generate_dashboard_snapshot_scorecard.py
      - name: Build dashboard snapshot digest
        run: python scripts/generate_dashboard_snapshot_digest.py
      - name: Build dashboard snapshot actions
        run: python scripts/generate_dashboard_snapshot_actions.py
      - name: Build dashboard snapshot alert packet
        run: python scripts/generate_dashboard_snapshot_alert_packet.py
      - name: Run smoke baseline
        run: MPLCONFIGDIR=/tmp/mpl python scripts/smoke_test.py
